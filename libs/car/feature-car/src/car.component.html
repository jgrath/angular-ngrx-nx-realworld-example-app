<div class="mat-elevation-z8 table-container">
  <!-- 1. Spinner Overlay -->
  @if (store.carsLoading()) {
    <div class="loading-shade">
      <mat-spinner></mat-spinner>
    </div>
  }

  <table mat-table [dataSource]="dataSource()">
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>No.</th>
      <td mat-cell *matCellDef="let car">{{ car.id }}</td>
    </ng-container>

    <!-- Brand Column -->
    <ng-container matColumnDef="brand">
      <th mat-header-cell *matHeaderCellDef>Brand</th>
      <td mat-cell *matCellDef="let car">{{ car.brand }}</td>
    </ng-container>

    <!-- Service Date Column -->
    <ng-container matColumnDef="serviceDate">
      <th mat-header-cell *matHeaderCellDef>Service Date</th>
      <td mat-cell *matCellDef="let car">{{ car.serviceDate | date: 'short' }}</td>
    </ng-container>

    <!-- Model Column -->
    <ng-container matColumnDef="model">
      <th mat-header-cell *matHeaderCellDef>Model</th>
      <td mat-cell *matCellDef="let car">{{ car.model }}</td>
    </ng-container>

    <!-- Year Built Column -->
    <ng-container matColumnDef="yearBuilt">
      <th mat-header-cell *matHeaderCellDef>Year Built</th>
      <td mat-cell *matCellDef="let car">{{ car.yearBuilt }}</td>
    </ng-container>

    <!-- Country Column -->
    <ng-container matColumnDef="country">
      <th mat-header-cell *matHeaderCellDef>Country</th>
      <td mat-cell *matCellDef="let car">{{ getCountryName(car.country) }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let car">
        <button mat-icon-button color="primary" (click)="openCarDialog(car)">edit</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of cars"></mat-paginator>

  <div class="button-container">
    <button mat-raised-button color="primary" style="width: 200px" (click)="openCarDialog()">Add</button>

    <!-- Disable Save while loading or saving -->
    <button
      mat-raised-button
      color="primary"
      style="width: 200px"
      (click)="saveAllCars()"
      [disabled]="store.isSaving() || store.isCarsLoading()"
    >
      @if (store.isSaving()) {
        Saving...
      } @else {
        Save
      }
    </button>
  </div>
</div>
